<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phronesis Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --radius: 6px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Noto Sans, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
  }

  /* Sidebar */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .sidebar h1 {
    font-size: 18px;
    font-weight: 600;
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    color: var(--accent);
  }
  .sidebar h1 small {
    display: block;
    font-size: 11px;
    font-weight: 400;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 14px;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .nav-item:hover { background: rgba(88,166,255,0.05); color: var(--text); }
  .nav-item.active {
    color: var(--text);
    background: rgba(88,166,255,0.1);
    border-left-color: var(--accent);
  }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

  /* Main */
  .main {
    flex: 1;
    padding: 24px 32px;
    overflow-y: auto;
    max-width: 1200px;
  }
  .page { display: none; }
  .page.active { display: block; }
  .page h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  .card h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  /* Search */
  .search-box {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .search-box input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
  }
  .search-box input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .search-box button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 8px 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
  }
  .search-box button:hover { filter: brightness(1.1); }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 2px solid var(--border);
    color: var(--text-muted);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  tr:hover td { background: rgba(88,166,255,0.03); }
  .session-title { font-weight: 500; cursor: pointer; color: var(--accent); }
  .session-title:hover { text-decoration: underline; }
  .session-id { color: var(--text-muted); font-family: var(--mono); font-size: 11px; }
  .snippet { color: var(--text-muted); font-size: 12px; line-height: 1.4; }
  .snippet mark { background: rgba(210,153,34,0.3); color: var(--yellow); padding: 0 2px; border-radius: 2px; }

  /* Config */
  pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.5;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .empty { color: var(--text-muted); font-style: italic; padding: 20px 0; }

  /* Gateway */
  .unit-list { list-style: none; }
  .unit-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .unit-item:last-child { border-bottom: none; }
  .unit-name { font-family: var(--mono); font-size: 13px; }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .status-active { background: rgba(63,185,80,0.15); color: var(--green); }
  .status-inactive { background: rgba(248,81,73,0.15); color: var(--red); }
  .status-other { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .unit-actions { display: flex; gap: 6px; }
  .unit-actions button {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    color: var(--text);
    cursor: pointer;
    font-size: 11px;
  }
  .unit-actions button:hover { border-color: var(--accent); color: var(--accent); }

  /* Session detail modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 90%;
    max-width: 800px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h3 { font-size: 16px; margin: 0; text-transform: none; letter-spacing: 0; color: var(--text); }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }
  .message {
    margin-bottom: 16px;
    padding: 12px;
    background: var(--bg);
    border-radius: var(--radius);
    border-left: 3px solid var(--border);
  }
  .message.user { border-left-color: var(--accent); }
  .message.assistant { border-left-color: var(--green); }
  .message.system { border-left-color: var(--yellow); }
  .message-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .message-role {
    font-weight: 600;
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.5px;
  }
  .message-text { font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

  /* Loading */
  .loading { color: var(--text-muted); text-align: center; padding: 40px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Stats */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; padding: 12px 0; flex-direction: row; flex-wrap: wrap; border-right: none; border-bottom: 1px solid var(--border); }
    .sidebar h1 { width: 100%; padding: 0 16px 12px; margin-bottom: 0; border-bottom: none; }
    .nav-item { flex: 1; min-width: 80px; justify-content: center; border-left: none; border-bottom: 2px solid transparent; font-size: 12px; padding: 8px 12px; }
    .nav-item.active { border-left: none; border-bottom-color: var(--accent); }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar">
  <h1>
    Phronesis
    <small>Dashboard</small>
  </h1>
  <div class="nav-item active" data-page="sessions" onclick="switchPage('sessions')">
    <span class="icon">&#128214;</span> Sessions
  </div>
  <div class="nav-item" data-page="config" onclick="switchPage('config')">
    <span class="icon">&#9881;</span> Config
  </div>
  <div class="nav-item" data-page="gateway" onclick="switchPage('gateway')">
    <span class="icon">&#128268;</span> Gateway
  </div>
  <div style="flex:1"></div>
  <div style="padding: 16px 20px; font-size: 11px; color: var(--text-muted);">
    <span id="profile-label">Loading...</span>
  </div>
</nav>

<!-- Main -->
<main class="main">

  <!-- Sessions page -->
  <div class="page active" id="page-sessions">
    <h2>Sessions</h2>
    <div class="stat-grid" id="session-stats"></div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search sessions..." onkeydown="if(event.key==='Enter') searchSessions()">
      <button onclick="searchSessions()">Search</button>
      <button onclick="loadSessions()" style="background:var(--border);color:var(--text)">Browse All</button>
    </div>
    <div id="session-results"><div class="empty">Run a search or click "Browse All" to see sessions.</div></div>
  </div>

  <!-- Config page -->
  <div class="page" id="page-config">
    <h2>Configuration</h2>
    <div class="card">
      <h3>Active Profile</h3>
      <div id="profile-config"></div>
    </div>
    <div class="card">
      <h3>Global Config</h3>
      <pre id="global-config">Loading...</pre>
    </div>
  </div>

  <!-- Gateway page -->
  <div class="page" id="page-gateway">
    <h2>Gateway Services</h2>
    <div id="gateway-content"><div class="loading"><span class="spinner"></span> Loading gateway status...</div></div>
  </div>

</main>

<!-- Session Detail Modal -->
<div class="modal-overlay" id="session-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Session</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="loading"><span class="spinner"></span> Loading...</div>
    </div>
  </div>
</div>

<script>
// ---- State ----
let currentProfile = "default";

// ---- Navigation ----
function switchPage(name) {
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  document.querySelector(`.nav-item[data-page="${name}"]`).classList.add("active");
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(`page-${name}`).classList.add("active");

  if (name === "config") loadConfig();
  if (name === "gateway") loadGateway();
}

// ---- Profile ----
async function loadProfile() {
  try {
    const res = await fetch("/api/profile");
    const data = await res.json();
    currentProfile = data.active_profile || "default";
    document.getElementById("profile-label").textContent = `Profile: ${currentProfile}`;
  } catch {
    document.getElementById("profile-label").textContent = "Profile: (error)";
  }
}

// ---- Sessions ----
async function loadSessions() {
  // SECURITY: every ${} interpolated into innerHTML below is either a trusted
  // constant, a numeric server field, or an escHtml'd user value. The session_id
  // is exposed via a data-* attribute (never via an onclick string) and the
  // click handler is attached AFTER innerHTML to prevent JS injection.
  const el = document.getElementById("session-results");
  el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading sessions...</div>';

  try {
    const res = await fetch(`/api/sessions?profile=${currentProfile}`);
    const data = await res.json();

    // Stats
    document.getElementById("session-stats").innerHTML = `
      <div class="stat-card"><div class="stat-value">${data.count}</div><div class="stat-label">Sessions</div></div>
    `;

    if (data.sessions.length === 0) {
      el.innerHTML = '<div class="empty">No sessions found. Run the opencode server to build a search index.</div>';
      return;
    }

    let html = '<table><thead><tr><th>Title</th><th>ID</th></tr></thead><tbody>';
    for (const s of data.sessions) {
      const shortId = (s.session_id || "").slice(0, 12);
      const title = s.session_title || "(untitled)";
      // session_id goes into a data attribute (escaped for attribute context)
      // and is wired to openSession via a click handler attached after innerHTML.
      // This avoids string interpolation of user data into onclick attributes,
      // which is the only XSS vector that cannot be neutralized by entity-escaping.
      html += `<tr>
        <td><span class="session-title" data-sid="${escHtml(s.session_id || "").replace(/"/g, "&quot;")}">${escHtml(title)}</span></td>
        <td><span class="session-id">${escHtml(shortId)}</span></td>
      </tr>`;
    }
    html += '</tbody></table>';
    el.innerHTML = html;
    // Attach click handlers from data-sid to avoid JS-injection in onclick strings.
    el.querySelectorAll(".session-title[data-sid]").forEach(span => {
      span.onclick = () => openSession(span.dataset.sid);
    });
  } catch (err) {
    el.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
  }
}

async function searchSessions() {
  // SECURITY: every ${} interpolated into innerHTML below is either a trusted
  // constant, a numeric server field, or an escHtml'd user value. The session_id
  // is exposed via a data-* attribute (never via an onclick string) and the
  // click handler is attached AFTER innerHTML to prevent JS injection.
  const q = document.getElementById("search-input").value.trim();
  const el = document.getElementById("session-results");

  if (!q) { loadSessions(); return; }

  el.innerHTML = '<div class="loading"><span class="spinner"></span> Searching...</div>';

  try {
    const res = await fetch(`/api/sessions/search?q=${encodeURIComponent(q)}&profile=${currentProfile}`);
    const data = await res.json();

    if (data.error) {
      el.innerHTML = `<div class="empty">${escHtml(data.error)}</div>`;
      return;
    }

    document.getElementById("session-stats").innerHTML = `
      <div class="stat-card"><div class="stat-value">${data.count}</div><div class="stat-label">Results</div></div>
    `;

    if (data.results.length === 0) {
      el.innerHTML = `<div class="empty">No results for "${escHtml(q)}".</div>`;
      return;
    }

    let html = '<table><thead><tr><th>Title</th><th>ID</th><th>Snippet</th></tr></thead><tbody>';
    for (const r of data.results) {
      const shortId = (r.session_id || "").slice(0, 12);
      const title = r.session_title || "(untitled)";
      const snippet = r.snippet || "";
      // session_id goes into a data attribute (escaped for attribute context)
      // and is wired to openSession via a click handler attached after innerHTML.
      html += `<tr>
        <td><span class="session-title" data-sid="${escHtml(r.session_id || "").replace(/"/g, "&quot;")}">${escHtml(title)}</span></td>
        <td><span class="session-id">${escHtml(shortId)}</span></td>
        <td class="snippet">${escHtml(snippet)}<!--
          TODO(security): re-add safe FTS5 highlight. The snippet() function
          returns text with <b>...</b> markers. To restore the bold without
          re-introducing XSS, escHtml the text first, then walk the result
          and split it into Text/Element nodes around the <b> markers before
          insertion (e.g. via DOMParser or a manual splitter). For now we
          drop the highlighting in favor of safety.
        --></td>
      </tr>`;
    }
    html += '</tbody></table>';
    el.innerHTML = html;
    // Attach click handlers from data-sid to avoid JS-injection in onclick strings.
    el.querySelectorAll(".session-title[data-sid]").forEach(span => {
      span.onclick = () => openSession(span.dataset.sid);
    });
  } catch (err) {
    el.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
  }
}

async function openSession(id) {
  // SECURITY: every ${} interpolated into the `html` string below is either a
  // trusted constant, a numeric server field, or an escHtml'd user value. The
  // only "raw" template slot is the role in the class attribute, which is
  // also passed through escHtml + &quot; escape to be safe for attribute use.
  const modal = document.getElementById("session-modal");
  const title = document.getElementById("modal-title");
  const body = document.getElementById("modal-body");

  modal.classList.add("open");
  title.textContent = `Session ${id.slice(0, 12)}`;
  body.innerHTML = '<div class="loading"><span class="spinner"></span> Loading session...</div>';

  try {
    const res = await fetch(`/api/sessions/${encodeURIComponent(id)}`);
    const data = await res.json();

    if (data.error) {
      body.innerHTML = `<div class="empty">${escHtml(data.error)}</div>`;
      return;
    }

    title.textContent = `Session: ${data.session.title || id.slice(0, 12)}`;

    let html = `<div style="margin-bottom:12px; font-size:12px; color:var(--text-muted);">
      Created: ${escHtml(data.session.time_created || "unknown")} &middot; ${data.messages.length} messages
    </div>`;

    for (const m of data.messages) {
      const role = m.role || "unknown";
      const text = m.text || "";
      // role appears in a class attribute (needs & and " escaped) and as text
      // content (needs < and & escaped). escHtml covers the latter; we add a
      // &quot; replace for the attribute slot.
      const roleAttr = escHtml(role).replace(/"/g, "&quot;");
      html += `<div class="message ${roleAttr}">
        <div class="message-header">
          <span class="message-role">${escHtml(role)}</span>
          <span style="font-size:11px;color:var(--text-muted)">${escHtml(m.time_created || "")}</span>
        </div>
        <div class="message-text">${escHtml(text)}</div>
      </div>`;
    }

    if (data.messages.length === 0) {
      html += '<div class="empty">No messages in this session.</div>';
    }

    body.innerHTML = html;
  } catch (err) {
    body.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
  }
}

function closeModal() {
  document.getElementById("session-modal").classList.remove("open");
}
document.getElementById("session-modal").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

// ---- Config ----
async function loadConfig() {
  try {
    const res = await fetch("/api/config");
    const data = await res.json();

    if (data.config) {
      document.getElementById("global-config").textContent = JSON.stringify(data.config, null, 2);
    } else {
      document.getElementById("global-config").textContent = "No config file found.";
    }
  } catch (err) {
    document.getElementById("global-config").textContent = `Error: ${err.message}`;
  }

  try {
    // SECURITY: the innerHTML assignments below use only escHtml'd JSON or
    // trusted constant strings; no unescaped user data lands in the DOM.
    const res = await fetch("/api/profile");
    const data = await res.json();
    const el = document.getElementById("profile-config");
    if (data.profile_config) {
      el.innerHTML = `<pre>${escHtml(JSON.stringify(data.profile_config, null, 2))}</pre>`;
    } else {
      el.innerHTML = '<div class="empty">No profile config (using defaults).</div>';
    }
  } catch { /* ignore */ }
}

// ---- Gateway ----
async function loadGateway() {
  // SECURITY: the unit list below interpolates escHtml'd user fields only
  // (u.name, u.description, u.active). NOTE: the unit actions buttons
  // (start/stop/restart) still embed u.name in an onclick string; this was
  // outside the C1 review scope and is tracked separately.
  const el = document.getElementById("gateway-content");
  el.innerHTML = '<div class="loading"><span class="spinner"></span> Loading gateway status...</div>';

  try {
    const res = await fetch(`/api/gateway/status?profile=${currentProfile}`);
    const data = await res.json();

    if (!data.systemctl_available) {
      el.innerHTML = '<div class="empty">systemctl is not available (not a Linux systemd system).</div>';
      return;
    }

    if (data.units.length === 0) {
      el.innerHTML = '<div class="empty">No Phronesis gateway services found. Install a gateway with <code>phronesis gateway install</code>.</div>';
      return;
    }

    let html = '<ul class="unit-list">';
    for (const u of data.units) {
      let statusClass = "status-other";
      if (u.active === "active") statusClass = "status-active";
      else if (u.active === "inactive" || u.active === "failed") statusClass = "status-inactive";

      html += `<li class="unit-item">
        <div>
          <div class="unit-name">${escHtml(u.name)}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${escHtml(u.description)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="status-badge ${statusClass}">${escHtml(u.active)}</span>
          <div class="unit-actions">
            <button onclick="gatewayAction('start','${u.name}')">Start</button>
            <button onclick="gatewayAction('stop','${u.name}')">Stop</button>
            <button onclick="gatewayAction('restart','${u.name}')">Restart</button>
          </div>
        </div>
      </li>`;
    }
    html += '</ul>';
    el.innerHTML = html;
  } catch (err) {
    el.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
  }
}

async function gatewayAction(action, unit) {
  try {
    const res = await fetch(`/api/gateway/${action}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ unit }),
    });
    const data = await res.json();

    if (data.status === "success") {
      setTimeout(loadGateway, 1000); // refresh after action
    } else {
      alert(`Action failed: ${data.stderr || data.error || "unknown error"}`);
    }
  } catch (err) {
    alert(`Error: ${err.message}`);
  }
}

// ---- Helpers ----
function escHtml(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ---- Init ----
loadProfile();
loadSessions();
