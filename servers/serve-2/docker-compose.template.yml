# ──────────────────────────────────────────────────────────
# Phronesis serve-2 — Containerized OpenCode server
# ──────────────────────────────────────────────────────────
services:
  server:
    build:
      context: ../..
      dockerfile: servers/serve-2/Dockerfile
    image: phronesis-serve:latest
    container_name: phronesis-server
    ports:
      - "127.0.0.1:4097:4097"
    volumes:
      - phronesis-server-data:/data
      - $HOME/.phronesis/workspace:/root/.phronesis/workspace:rw
    restart: unless-stopped

volumes:
  phronesis-server-data: