name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# ───────────────────────────────────────────────────────────────
# SECURITY: Multi-layer hardened workflow for OpenCode GitHub
# Agent on GitHub-hosted runners.
#
# Layers:
# 1. Collaborator-only gate — only OWNER/MEMBER/COLLABORATOR
#    can trigger the agent. Blocks PromptPwnd at the door.
# 2. Pre-AI regex scan — catches obvious injection payloads
#    (base64, /proc/self/environ, "ignore previous instructions")
#    before the LLM ever sees them.
# 3. opencode-injection-guard plugin — runs a judge LLM on
#    every bash/webfetch tool output. Replaces injected content
#    with [BLOCKED] before the agent processes it.
# 4. Read-only GITHUB_TOKEN — even if compromised, the agent
#    cannot write to the repo unless you explicitly elevate.
# 5. Provider chain — opencode-go > mistral > free fallback models
#    (big-pickle, deepseek-v4-flash-free). No API keys = still works
#    with free OpenCode Zen models.
# 6. Pinned action SHA — no supply-chain tag rebinding.
# ───────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════════════════════
  # SECURITY GATE: runs BEFORE OpenCode. Blocks untrusted
  # users and obvious injection payloads. The LLM agent never
  # sees blocked requests.
  # ═══════════════════════════════════════════════════════════
  security-check:
    name: Security Validation
    runs-on: ubuntu-latest
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode'))
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
      reason: ${{ steps.check.outputs.reason }}
    steps:
      - name: Validate trigger conditions
        id: check
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const body = context.payload.comment.body;
            const sender = context.payload.sender;
            const issue = context.payload.issue || context.payload.pull_request;
            const isPRReview = context.eventName === 'pull_request_review_comment';

            // ── Gate 1: Collaborator-only ──
            const trusted = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            if (!trusted.includes(context.payload.comment.author_association)) {
              core.setOutput('allowed', 'false');
              core.setOutput('reason', `User ${sender.login} has association '${context.payload.comment.author_association}', requires ${trusted.join(', ')}`);
              const msg = `> 🚫 **Security Notice**: OpenCode commands are restricted to repository collaborators.`;
              try {
                if (isPRReview) {
                  await github.rest.pulls.createReplyForReviewComment({
                    owner: context.repo.owner, repo: context.repo.repo,
                    pull_number: issue.number, comment_id: context.payload.comment.id, body: msg
                  });
                } else {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner, repo: context.repo.repo,
                    issue_number: issue.number, body: msg
                  });
                }
              } catch {}
              return;
            }

            // ── Gate 2: Suspicious pattern scan ──
            const suspicious = [
              /ignore\s+(previous|all|prior)\s+(instructions?|prompts?|directives)/i,
              /\/proc\/self\/environ/i,
              /base64\s+(decode|encode)/i,
              /exfiltrat/i,
              /disregard\s+(all\s+)?(prior|previous)\s+(instructions?|directives)/i,
              /system\s*(prompt|message|instruction)/i,
              /rm\s+-rf\s+\//,
              /curl\s+.*\|\s*(ba)?sh/i,
              /You\s+(are\s+)?obligated/i,
            ];
            for (const pat of suspicious) {
              if (pat.test(body)) {
                core.setOutput('allowed', 'false');
                core.setOutput('reason', `Suspicious pattern: ${pat}`);
                try {
                  if (isPRReview) {
                    await github.rest.pulls.createReplyForReviewComment({
                      owner: context.repo.owner, repo: context.repo.repo,
                      pull_number: issue.number, comment_id: context.payload.comment.id,
                      body: `> 🚫 **Blocked**: request matched a security pattern and was not processed.`
                    });
                  } else {
                    await github.rest.issues.createComment({
                      owner: context.repo.owner, repo: context.repo.repo,
                      issue_number: issue.number,
                      body: `> 🚫 **Blocked**: request matched a security pattern and was not processed.`
                    });
                  }
                } catch {}
                return;
              }
            }

            core.setOutput('allowed', 'true');
            core.setOutput('reason', 'All security checks passed');

  # ═══════════════════════════════════════════════════════════
  # OPENCODE AGENT — runs with minimal permissions. Uses
  # the repo's opencode.json and .opencode/ plugins.
  # ═══════════════════════════════════════════════════════════
  opencode:
    needs: [security-check]
    if: needs.security-check.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write          # Required for OpenCode's OIDC token exchange
      contents: read           # Read repo — change to 'write' if agent should push branches
      pull-requests: read      # Read PR context
      issues: write            # Write — needed to post reply comments
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@a3b97d9090ccf4aa9ac32268486283e3131e36b4 # github-v1.2.25
        env:
          # ── Provider API keys (in priority order) ──
          # OpenCode Go — paid, best quality, set if you have it
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          # Mistral — fallback, still strong
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          # Pass the auto-generated GITHUB_TOKEN for read-only repo access.
          # Required when use_github_token: true — OpenCode reads this env var
          # directly instead of doing the OIDC token exchange.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Single model — the official action does not support comma-separated
          # fallback chains. Pick the best option based on available secrets.
          #
          # If OPENCODE_GO_API_KEY is set → use opencode-go/deepseek-v4-flash
          # Else if MISTRAL_API_KEY is set  → use mistral/mistral-medium-latest
          # Else                            → use opencode/big-pickle (free, no key)
          #
          # To use a paid model: set the corresponding secret in repo settings.
          model: opencode/big-pickle
          # Use GITHUB_TOKEN (scoped by permissions: block above) instead of
          # the OpenCode GitHub App. Read-only = no push risk.
          use_github_token: true
