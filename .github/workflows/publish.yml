name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm ci
        working-directory: ./cli
      - name: CLI unit tests
        run: npm test
        working-directory: ./cli
      - name: Plugin integration tests
        run: node tests/plugins/test.mjs

  publish:
    needs: test
    # Best-effort — don't block release if npm publish fails
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - name: Publish to npm registry
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release:
    needs: test
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate release notes from changelog
        run: |
          # Tag is like "v0.1.0", CHANGELOG header is "## [0.1.0]"
          VERSION="${{ github.ref_name }}"
          SEMVER="${VERSION#v}"
          echo "## Release $VERSION" > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          sed -n "/^## \[$SEMVER\]/,/^## \[/p" CHANGELOG.md | head -n -2 >> /tmp/release-notes.md 2>/dev/null || true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          generate_release_notes: true
